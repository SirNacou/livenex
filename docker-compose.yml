version: '3.8'

services:
  # Unified Livenex Application (TanStack Start + ElysiaJS)
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: livenex-app
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/livenex
      - REDIS_URL=redis://redis:6379
      - BETTER_AUTH_SECRET=local-dev-secret
    ports:
      - "3000:3000"
    networks:
      - livenex-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: bun run dev

  # PostgreSQL database
  postgres:
    image: postgres:18-alpine
    container_name: livenex-postgres
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=livenex
    ports:
      - "5432:5432"
    networks:
      - livenex-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for job queue - optional for Phase 1)
  redis:
    image: redis:7-alpine
    container_name: livenex-redis
    ports:
      - "6379:6379"
    networks:
      - livenex-network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  livenex-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
